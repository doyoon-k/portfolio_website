<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Game Dev Portfolio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Quill library -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 100px auto;
            padding: 2rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #0a0a0c;
            border: 1px solid #333;
            color: white;
            font-family: var(--font-main);
            box-sizing: border-box;
        }

        .form-group small {
            color: #888;
            font-size: 0.85rem;
        }

        .project-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #0a0a0c;
            margin-bottom: 1rem;
            border: 1px solid #333;
        }

        .hidden {
            display: none;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        /* Split editor + preview layout */
        .editor-preview-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .editor-panel,
        .preview-panel {
            display: flex;
            flex-direction: column;
        }

        .editor-panel label,
        .preview-panel label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .preview-panel label {
            color: var(--accent-color);
        }

        /* Live preview box — mirrors actual modal styling */
        #livePreview {
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 1.5rem;
            border-radius: 4px;
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.8;
        }

        /* Rich content styling inside preview — match modal styles */
        #livePreview img { max-width: 100%; height: auto; border-radius: 4px; margin: 0.5rem 0; }
        #livePreview a { color: var(--accent-color); }
        #livePreview h1, #livePreview h2, #livePreview h3 { color: var(--accent-color); margin: 1rem 0 0.5rem; }
        #livePreview pre, #livePreview code { background: #0a0a0c; color: #0ff; font-family: monospace; padding: 0.2em 0.4em; border-radius: 3px; }
        #livePreview pre { padding: 1rem; overflow-x: auto; }
        #livePreview ul, #livePreview ol { padding-left: 1.5rem; color: var(--text-secondary); }
        #livePreview blockquote { border-left: 3px solid var(--accent-color); padding-left: 1rem; color: var(--text-secondary); margin: 0.5rem 0; }
        #livePreview * { color: inherit; }
        #livePreview [style*="color"] { color: unset; }

        /* Quill Editor Dark Theme Overrides */
        .ql-toolbar.ql-snow, .ql-container.ql-snow {
            border-color: #333 !important;
            font-family: var(--font-main);
        }
        .ql-editor {
            font-family: var(--font-main);
            font-size: 1rem;
            min-height: 360px;
            color: #e0e0e0;
            background: #0a0a0c;
        }
        .ql-snow .ql-stroke {
            stroke: #ccc !important;
        }
        .ql-snow .ql-fill {
            fill: #ccc !important;
        }
        .ql-snow .ql-picker {
            color: #ccc !important;
        }
        .ql-snow .ql-picker-options {
            background-color: #111 !important;
            border-color: #333 !important;
        }
        /* Color picker circles */
        .ql-color-picker .ql-picker-item {
            border: 1px solid #444;
        }
        /* Toolbar background */
        .ql-toolbar.ql-snow {
            background: #111;
        }
        /* Active/hover state */
        .ql-snow.ql-toolbar button:hover .ql-stroke,
        .ql-snow .ql-toolbar button:hover .ql-stroke {
            stroke: var(--accent-color) !important;
        }
        .ql-snow.ql-toolbar button.ql-active .ql-stroke {
            stroke: var(--accent-color) !important;
        }

        @media (max-width: 900px) {
            .editor-preview-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">ADMIN<span class="highlight">.PANEL</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Site</a></li>
            <li><a href="#" id="logoutBtn" class="hidden">Logout</a></li>
        </ul>
    </nav>

    <!-- Login Section -->
    <section id="loginSection" class="admin-container" style="max-width:500px">
        <h2 class="section-title">Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn primary-btn">Login</button>
        </form>
    </section>

    <!-- Dashboard Section -->
    <section id="dashboardSection" class="admin-container hidden">
        <div class="dashboard-header">
            <h2>Manage Projects</h2>
            <button id="showAddFormBtn" class="btn secondary-btn">Add New Project</button>
        </div>

        <!-- Add/Edit Form -->
        <div id="projectFormContainer" class="hidden">
            <h3 id="formTitle">Add Project</h3>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="pTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Tech Stack</label>
                        <input type="text" id="pStack" placeholder="e.g. Unity • C#" required>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Image URL (optional)</label>
                        <input type="text" id="pImageUrl" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Or Upload Image</label>
                        <input type="file" id="pImageFile" accept="image/*">
                        <small>Upload a project image (stored in Supabase)</small>
                    </div>
                </div>

                <!-- Editor + Preview side by side -->
                <div class="form-group">
                    <div class="editor-preview-wrapper">
                        <div class="editor-panel">
                            <label>✏️ Description Editor</label>
                            <div id="pDescEditor"></div>
                        </div>
                        <div class="preview-panel">
                            <label>👁 Live Preview (as it appears on site)</label>
                            <div id="livePreview"><em style="color:#555">Start typing to see your preview here…</em></div>
                        </div>
                    </div>
                </div>

                <div style="display:flex; gap:1rem; margin-top:0.5rem;">
                    <button type="submit" class="btn primary-btn">Save Project</button>
                    <button type="button" id="cancelBtn" class="btn secondary-btn">Cancel</button>
                </div>
            </form>
            <hr style="margin: 2rem 0; border-color: #333;">
        </div>

        <!-- List of Projects -->
        <div id="projectsList">
            <!-- Dynamic items will be added here -->
        </div>
    </section>

    <script type="module" src="admin.js"></script>
</body>

</html>
