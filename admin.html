<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Game Dev Portfolio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Jodit WYSIWYG editor (full HTML preservation) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jodit/3.24.6/jodit.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jodit/3.24.6/jodit.min.js"></script>

    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/csharp.min.js"></script>
    
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 100px auto 4rem;
            padding: 2rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #0a0a0c;
            border: 1px solid #333;
            color: white;
            font-family: var(--font-main);
            box-sizing: border-box;
        }

        .form-group small {
            color: #888;
            font-size: 0.85rem;
        }

        .project-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #0a0a0c;
            margin-bottom: 1rem;
            border: 1px solid #333;
        }

        .hidden { display: none; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        /* Split editor + preview layout */
        .editor-preview-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .editor-panel, .preview-panel {
            display: flex;
            flex-direction: column;
        }

        .editor-panel > label,
        .preview-panel > label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .editor-panel > label { color: var(--text-secondary); }
        .preview-panel > label { color: var(--accent-color); }

        /* Live preview box — mirrors actual modal styling */
        #livePreview {
            min-height: 500px;
            max-height: 650px;
            overflow-y: auto;
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 1.5rem;
            border-radius: 4px;
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        /* Mirror site's rich-content CSS in preview */
        #livePreview img  { max-width: 100%; height: auto; border-radius: 4px; margin: 0.5rem 0; display: block; }
        #livePreview a    { color: var(--accent-color); }
        #livePreview h1, #livePreview h2, #livePreview h3 { color: var(--accent-color); margin: 1rem 0 0.5rem; }
        #livePreview pre, #livePreview code { background: #0a0a0c; color: #0ff; font-family: monospace; padding: 0.2em 0.4em; border-radius: 3px; }
        #livePreview pre  { padding: 1rem; overflow-x: auto; }
        #livePreview ul, #livePreview ol { padding-left: 1.5rem; color: var(--text-secondary); }
        #livePreview blockquote { border-left: 3px solid var(--accent-color); padding-left: 1rem; color: var(--text-secondary); margin: 0.5rem 0; }
        #livePreview * {
            color: var(--text-primary) !important;
            background-color: transparent !important;
        }
        /* Keep code blocks distinct */
        #livePreview pre, #livePreview code {
            background: #0a0a0c !important;
            color: #0ff !important;
        }

        /* Jodit dark override */
        .jodit-container { border-color: #444 !important; }
        .jodit-toolbar { background: #111 !important; border-color: #333 !important; }
        .jodit-workplace { background: #0a0a0c !important; }
        .jodit-wysiwyg { color: #e0e0e0 !important; background: #0a0a0c !important; }
        .jodit-status-bar { background: #111 !important; color: #777 !important; border-color: #333 !important; }

        @media (max-width: 900px) {
            .editor-preview-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">ADMIN<span class="highlight">.PANEL</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Site</a></li>
            <li><a href="#" id="logoutBtn" class="hidden">Logout</a></li>
        </ul>
    </nav>

    <!-- Login Section -->
    <section id="loginSection" class="admin-container" style="max-width:500px">
        <h2 class="section-title">Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn primary-btn">Login</button>
        </form>
    </section>

    <!-- Dashboard Section -->
    <section id="dashboardSection" class="admin-container hidden">
        <div class="admin-tabs" style="margin-bottom: 2rem; border-bottom: 2px solid #2a2a2a;">
            <button id="tabProjects" class="btn primary-btn" style="border-radius: 4px 4px 0 0; margin-right: 0.5rem;">Manage Projects</button>
            <button id="tabSettings" class="btn secondary-btn" style="border-radius: 4px 4px 0 0;">Site Settings</button>
        </div>

        <!--  === PROJECTS VIEW === -->
        <div id="projectsView">
            <div class="dashboard-header">
                <h2>Manage Projects</h2>
                <button id="showAddFormBtn" class="btn secondary-btn">Add New Project</button>
            </div>

            <!-- Add/Edit Form -->
            <div id="projectFormContainer" class="hidden">
            <h3 id="formTitle">Add Project</h3>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="pTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Tech Stack</label>
                        <input type="text" id="pStack" placeholder="e.g. Unity • C#" required>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Image URL (optional)</label>
                        <input type="text" id="pImageUrl" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Or Upload Image</label>
                        <input type="file" id="pImageFile" accept="image/*">
                        <small>Upload a project image (stored in Supabase)</small>
                    </div>
                </div>

                <!-- Editor + Preview side by side -->
                <div class="form-group">
                    <div class="editor-preview-wrapper">
                        <div class="editor-panel">
                            <label>✏️ Description Editor</label>
                            <textarea id="pDescEditor"></textarea>
                        </div>
                        <div class="preview-panel">
                            <label>👁 Live Preview (as it appears on site)</label>
                            <div id="livePreview"><em style="color:#555">Start editing to see a preview…</em></div>
                        </div>
                    </div>
                </div>

                <div style="display:flex; gap:1rem; margin-top:0.5rem;">
                    <button type="submit" class="btn primary-btn">Save Project</button>
                    <button type="button" id="cancelBtn" class="btn secondary-btn">Cancel</button>
                </div>
            </form>
            <hr style="margin: 2rem 0; border-color: #333;">
        </div>

        <!-- List of Projects -->
        <div id="projectsList">
            <!-- Dynamic items will be added here -->
        </div>
        </div> <!-- End of projectsView -->

        <!-- === SETTINGS VIEW === -->
        <div id="settingsView" class="hidden">
            <h3 style="margin-bottom: 1rem;">Global Site Settings</h3>
            <form id="settingsForm">
                <!-- Hero Section -->
                <h4 style="color:var(--accent-cyan); margin-top:1.5rem;">Hero Section</h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Main Title (Glitch Text)</label>
                        <input type="text" id="sHeroT1" required>
                    </div>
                    <div class="form-group">
                        <label>Sub Title</label>
                        <input type="text" id="sHeroT2" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Hero Description</label>
                    <input type="text" id="sHeroSub" required>
                </div>

                <!-- About Section -->
                <h4 style="color:var(--accent-cyan); margin-top:1.5rem;">About Section</h4>
                <div class="form-group">
                    <label>About Description (Use newlines for paragraphs)</label>
                    <textarea id="sAboutText" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label>Skills (comma-separated)</label>
                    <input type="text" id="sSkillsInput" placeholder="Unity, C#, Unreal Engine, C++, ..." style="width:100%;">
                    <small style="color:#666;">Enter skills separated by commas. They display as tags on the site.</small>
                </div>

                <!-- Contact Section -->
                <h4 style="color:var(--accent-cyan); margin-top:1.5rem;">Contact Section</h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Contact Title (HTML allowed)</label>
                        <input type="text" id="sContactTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Text</label>
                        <input type="text" id="sContactText" required>
                    </div>
                </div>

                <div style="margin-top:2rem;">
                    <button type="submit" class="btn primary-btn">Save Settings</button>
                </div>
            </form>
        </div> <!-- End of settingsView -->
    </section>

    <script type="module" src="admin.js"></script>
</body>

</html>
